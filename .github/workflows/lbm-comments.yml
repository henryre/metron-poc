name: "LBM: Comment Commands"
on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write
jobs:
  handle:
    uses: henryre/lbm-poc/.github/workflows/_comments.yml@v1
    secrets: inherit
    with:
      config-path: lbm.toml

  claude:
    if: >-
      github.event_name == 'issue_comment' &&
      contains(github.event.comment.body, '@claude')
    uses: henryre/lbm-poc/.github/workflows/_agent-claude.yml@v1
    secrets: inherit
    with:
      config-path: lbm.toml

